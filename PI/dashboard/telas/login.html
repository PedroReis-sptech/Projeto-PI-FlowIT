<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Flow</title>
<link rel="stylesheet" href="styleClaro.css">
</head>
<body>

<div class="container">

  <div class="esquerdo">

      <h1>Flow</h1>
      <h2>Bem-vindo de volta!</h2>
      <hr>
      <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisque faucibus ex sapien vitae pellentesque sem placerat.</p> 
  </div>

  <div class="direito">
    <h1 class="login">LOGIN</h1>

    <div class="formulario">
      <div class="input-group">
        <input type="text" id="inputEmail" placeholder="Email">
      </div>

      <div class="input-group">
        <input type="password" id="inputSenha" placeholder="Senha">
      </div>

      <button class="botao" onclick="logar()">ENTRAR</button>

      <div class="link">
        Ainda não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
      </div>

      <div id="exibir"></div>
    </div>
  </div>

</div>
</body>
</html>

<script>
    function logar() {
        let email = inputEmail.value;
        let senhaInserida = inputSenha.value;
        let emailCorreto = "brandao@gmail.com";
        let senhaCorreta = "1234";

        let mensagem = "";
        let acertosEmail = 0
        let acertosSenha = 0

        for(let i = 0; i < emailCorreto.length; i++) {
            if(email[i] == emailCorreto[i]){
              acertosEmail++;
            }
        }
        for(let i = 0; i < senhaCorreta.length; i++){
            if(senhaInserida[i] == senhaCorreta[i]){
              acertosSenha++;
            }
        }

        if(acertosEmail == emailCorreto.length && email.length == emailCorreto.length &&
        acertosSenha == senhaCorreta.length && senhaInserida.length == senhaCorreta.length){
           mensagem = `<p class="exibir sucesso">Login confirmado! <br>
            Redirecionando...</p>`;
          setTimeout(function () {
                        window.location.href = "../dashboard.html";
                    }, 1000);
        }else{
          mensagem = `<p class="exibir erro">Senha e/ou Email inválidos.</p>`;
        }

        exibir.innerHTML = mensagem;
    }
</script>
